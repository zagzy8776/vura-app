services:
  - type: web
    name: vura-frontend
    runtime: static
    buildCommand: npm run build
    publishDir: dist
    envVars:
      # Must be your BACKEND service URL (not the frontend). Wrong value causes "Unexpected token 'export'" and failed login.
      # Backend API base URL (same Render service or separate).
      - key: VITE_API_URL
        value: https://vura-app.onrender.com/api
    healthCheckPath: /
    
  # Backend URL will be https://vura-app.onrender.com
  - type: web
    name: vura-app
    runtime: node
    buildCommand: cd vura-backend && npm ci && npx prisma generate --schema=prisma/schema.prisma && npx prisma migrate deploy && npm run build
    startCommand: cd vura-backend && npm run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: PRISMA_POOL_MAX
        value: "1"
      - key: JWT_SECRET
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: PAYSTACK_WEBHOOK_SECRET
        sync: false
      - key: MONNIFY_API_KEY
        sync: false
      - key: MONNIFY_SECRET_KEY
        sync: false
      - key: PREMBLY_API_KEY
        sync: false
      - key: BUSHA_SECRET_KEY
        sync: false
      - key: CLOUDINARY_URL
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: FRONTEND_URL
        value: https://vura-app.vercel.app
      # Not used at runtime; backend does not call itself. Kept for consistency.
      - key: VITE_API_URL
        value: https://vura-app.onrender.com/api
      - key: RESEND_API_KEY
        sync: false
      - key: FROM_EMAIL
        sync: false
      - key: IVORYPAY_SECRET_KEY
        sync: false
    healthCheckPath: /api/health
